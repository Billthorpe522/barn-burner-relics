<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barn Burner Relics — Pipeline Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        background: #0d0d0d;
        color: #e8e0d8;
        line-height: 1.5;
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 1500px; margin: 0 auto; padding: 0 24px; }
    h1, h2, h3, h4 {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700;
        line-height: 1.2;
    }

    /* ---------- Header ---------- */
    .board-header {
        background: linear-gradient(180deg, #1a1410 0%, #0d0d0d 100%);
        border-bottom: 2px solid #8b4513;
        padding: 36px 24px 28px;
        text-align: center;
    }
    .board-header h1 {
        color: #d4a853;
        font-size: 2.4rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }
    .board-header .subtitle {
        color: #a89880;
        font-size: 1rem;
        margin-top: 6px;
        font-style: italic;
    }
    .board-header .meta {
        color: #6a5f4a;
        font-size: 0.8rem;
        margin-top: 12px;
        font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    }
    .board-header .meta a {
        color: #d4a853;
        text-decoration: underline;
        text-decoration-color: #8b4513;
    }
    .nav-links {
        margin-top: 18px;
        display: flex;
        justify-content: center;
        gap: 28px;
        flex-wrap: wrap;
    }
    .nav-links a {
        color: #d4a853;
        font-family: 'Playfair Display', serif;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        border-bottom: 1px solid #8b4513;
        padding-bottom: 2px;
    }

    /* ---------- Board grid ---------- */
    .board {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
        padding: 24px 24px 60px;
        /* Lock the board to viewport height so columns scroll internally */
        height: calc(100vh - 220px);
        min-height: 600px;
    }
    @media (max-width: 1200px) {
        .board { grid-template-columns: repeat(3, minmax(0, 1fr)); height: auto; }
    }
    @media (max-width: 800px) {
        .board { grid-template-columns: 1fr; height: auto; }
    }

    .column {
        background: #14110d;
        border: 1px solid #2a2218;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        min-height: 0;  /* allow flex children to scroll */
    }
    .column-header {
        padding: 12px 14px;
        border-bottom: 1px solid #2a2218;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-shrink: 0;
    }
    .column-header .col-title {
        font-family: 'Playfair Display', serif;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #d4a853;
        font-weight: 700;
    }
    .column-header .col-count {
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        color: #a89880;
        background: #1f1a14;
        padding: 2px 10px;
        border-radius: 12px;
        min-width: 28px;
        text-align: center;
    }
    .column-body {
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        flex: 1;
        /* Slim scrollbar */
        scrollbar-width: thin;
        scrollbar-color: #3d3528 transparent;
    }
    .column-body::-webkit-scrollbar { width: 6px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb {
        background: #3d3528;
        border-radius: 3px;
    }
    .column-empty {
        color: #5a5040;
        font-style: italic;
        font-size: 0.85rem;
        padding: 20px 12px;
        text-align: center;
    }

    /* ---------- Card (compact horizontal layout) ---------- */
    .card {
        background: #1a1610;
        border: 1px solid #2a2218;
        border-radius: 4px;
        overflow: hidden;
        transition: transform 0.12s ease, border-color 0.12s ease;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        min-height: 76px;
    }
    .card:hover {
        transform: translateY(-1px);
        border-color: #8b4513;
    }
    .card-thumb {
        width: 76px;
        height: 76px;
        flex-shrink: 0;
        background: #0a0807;
        object-fit: cover;
        display: block;
    }
    .card-thumb-placeholder {
        width: 76px;
        height: 76px;
        flex-shrink: 0;
        background: repeating-linear-gradient(
            45deg,
            #14110d,
            #14110d 6px,
            #1a1610 6px,
            #1a1610 12px
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: #3d3528;
        font-family: 'Playfair Display', serif;
        font-size: 0.55rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        text-align: center;
        padding: 4px;
    }
    .card-body {
        padding: 8px 10px;
        flex: 1;
        min-width: 0;  /* allow text to truncate */
        display: flex;
        flex-direction: column;
        gap: 3px;
        justify-content: space-between;
    }
    .card-title {
        font-family: 'Playfair Display', serif;
        font-size: 0.85rem;
        color: #e8e0d8;
        font-weight: 600;
        line-height: 1.2;
        /* Truncate to 2 lines */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .card-meta {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
    }
    .tier-badge {
        font-family: ui-monospace, monospace;
        font-size: 0.6rem;
        padding: 1px 5px;
        border-radius: 2px;
        letter-spacing: 0.04em;
        font-weight: 700;
        white-space: nowrap;
    }
    .tier-T1 { background: #8b4513; color: #f4e4c8; }
    .tier-T2 { background: #6a4a2a; color: #e8d4a8; }
    .tier-T3 { background: #3d3528; color: #c4b48a; }
    .tier-T4 { background: #2a2218; color: #6a5f4a; }
    .card-price {
        font-family: 'Playfair Display', serif;
        font-size: 0.78rem;
        color: #d4a853;
        font-weight: 600;
    }
    .card-price.sold { color: #6a5f4a; text-decoration: line-through; }
    .card-blocker {
        font-size: 0.72rem;
        color: #a89880;
        font-style: italic;
        line-height: 1.3;
        /* clamp to 1 line */
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: ui-monospace, monospace;
        font-size: 0.6rem;
        color: #6a5f4a;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-top: 2px;
    }
    .card-footer a {
        color: #d4a853;
        border-bottom: 1px dotted #8b4513;
    }
    .card-footer a:hover { color: #f4c878; }

    /* Sold-card desaturation */
    .column[data-col="sold"] .card {
        opacity: 0.6;
        filter: grayscale(40%);
    }
    .column[data-col="sold"] .card:hover {
        opacity: 0.85;
        filter: grayscale(15%);
    }

    /* ---------- Error state ---------- */
    .board-error {
        background: #2a1410;
        border: 1px solid #8b3030;
        color: #f4c8b8;
        padding: 16px 20px;
        border-radius: 4px;
        margin: 24px;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
    }
    .board-error code {
        background: #1a0808;
        padding: 1px 6px;
        border-radius: 2px;
        color: #f4c8b8;
    }
</style>
</head>
<body>
<header class="board-header">
    <h1>Pipeline Board</h1>
    <div class="subtitle">From Cam's package → live BIN catalog</div>
    <div class="meta">
        <span id="generated">loading…</span>
        &nbsp;·&nbsp;
        <a href="board-data.json">board-data.json</a>
    </div>
    <nav class="nav-links">
        <a href="index.html">Catalog →</a>
        <a href="gallery/">Auction →</a>
        <a href="https://barnburnerrelics.net" target="_blank" rel="noopener">barnburnerrelics.net →</a>
    </nav>
</header>

<div id="root" class="container">
    <div style="padding: 60px 24px; text-align: center; color: #6a5f4a; font-style: italic;">
        Loading board…
    </div>
</div>

<script>
const COLUMNS = [
    { id: 'awaiting',       title: 'Awaiting Description' },
    { id: 'needs_closeup',  title: 'Needs Closeup'        },
    { id: 'ready',          title: 'Ready to Ship'        },
    { id: 'live',           title: 'Live (BIN Catalog)'    },
    { id: 'sold',           title: 'Sold'                 },
];

const TIER_LABEL = { T1: 'T1 Hero', T2: 'T2 Premium', T3: 'T3 Access', T4: 'T4 Held' };

function tierBadge(tier) {
    if (!tier) return '';
    return `<span class="tier-badge tier-${tier}">${TIER_LABEL[tier] || tier}</span>`;
}

function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
}

function renderCard(card) {
    const thumb = card.thumbnail
        ? `<img class="card-thumb" src="${escapeHtml(card.thumbnail)}" alt="${escapeHtml(card.title)}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-thumb-placeholder\\'>No Image</div>'">`
        : `<div class="card-thumb-placeholder">No Image</div>`;

    const price = card.price
        ? `<span class="card-price ${card.price.toUpperCase() === 'SOLD' ? 'sold' : ''}">${escapeHtml(card.price)}</span>`
        : '';

    const blocker = card.blocker
        ? `<div class="card-blocker">${escapeHtml(card.blocker)}</div>`
        : '';

    // Footer: provenance link if it exists, otherwise slug reference
    let footerRight;
    if (card.provenance_url) {
        footerRight = `<a href="${escapeHtml(card.provenance_url)}">provenance</a>`;
    } else if (card.in_catalog) {
        footerRight = `<a href="index.html#${escapeHtml(card.slug)}">catalog →</a>`;
    } else {
        footerRight = '';
    }

    return `
        <div class="card">
            ${thumb}
            <div class="card-body">
                <div class="card-title">${escapeHtml(card.title)}</div>
                <div class="card-meta">
                    ${tierBadge(card.tier)}
                    ${price}
                </div>
                ${blocker}
                <div class="card-footer">
                    <span>${escapeHtml(card.slug)}</span>
                    ${footerRight}
                </div>
            </div>
        </div>
    `;
}

function renderBoard(data) {
    document.getElementById('generated').textContent =
        `generated ${data.generated_at} · ${data.totals.awaiting + data.totals.needs_closeup + data.totals.ready + data.totals.live + data.totals.sold} pieces total`;

    const root = document.getElementById('root');
    root.className = 'board';
    root.innerHTML = COLUMNS.map(col => {
        const items = data.columns[col.id] || [];
        const body = items.length
            ? items.map(renderCard).join('')
            : `<div class="column-empty">— nothing here —</div>`;
        return `
            <section class="column" data-col="${col.id}">
                <header class="column-header">
                    <span class="col-title">${col.title}</span>
                    <span class="col-count">${items.length}</span>
                </header>
                <div class="column-body">
                    ${body}
                </div>
            </section>
        `;
    }).join('');
}

function renderError(msg) {
    document.getElementById('root').innerHTML = `
        <div class="board-error">
            <strong>Could not load board data.</strong><br>
            ${msg}<br><br>
            Re-run <code>python docs/build_board.py</code> from the repo root and commit <code>board-data.json</code>.
        </div>
    `;
}

fetch('board-data.json', { cache: 'no-cache' })
    .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status} — board-data.json missing or unreachable`);
        return r.json();
    })
    .then(renderBoard)
    .catch(err => renderError(err.message));
</script>
</body>
</html>
